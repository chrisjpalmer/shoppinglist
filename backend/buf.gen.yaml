version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/chrisjpalmer/shoppinglist/backend/genpb
plugins:
  - remote: buf.build/protocolbuffers/go
    out: genpb
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: genpb
    opt: paths=source_relative
inputs:
  - directory: proto