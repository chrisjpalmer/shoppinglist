apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    {{- include "backend.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: "ghcr.io/chrisjpalmer/shoppinglist/backend:{{ .Values.image.tag }}"
          volumeMounts:
            - mountPath: /app/local
              name: db
          env:
            - name: DATABASE_FILE
              value: /app/local/local.db  
          command: ["/migrations/entrypoint.sh"]
      containers:
        - name: backend
          image: "ghcr.io/chrisjpalmer/shoppinglist/backend:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: shopping
              containerPort: 8081
              protocol: TCP
          env:
            - name: PLANNING_SITE_URL
              value: {{ .Values.planningSiteUrl }}
          volumeMounts:
            - mountPath: /app/local
              name: db
      volumes:
        - name: db
          hostPath:
            path: /home/chris/shoppinglist/local
