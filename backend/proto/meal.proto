syntax = "proto3";

message Meal {
    int64 id = 1;
    string name = 2;
    repeated IngredientRef ingredient_refs = 3;
    string recipe_url = 4;
    string preview_image_url = 5;
    string ingredients_image_url = 6;
}

message IngredientRef {
    int64 ingredient_id = 1;
    int32 number = 2;
}