syntax = "proto3";

import "plan.proto";
import "meal.proto";
import "ingredient.proto";
import "ingredient_category.proto";

// plan

message GetPlanRequest {

}

message GetPlanResponse {
  Plan plan = 1;
  PlanSummary plan_summary = 2;
}

message UpdatePlanRequest {
  Plan plan = 1;
}

message UpdatePlanResponse {

}

// meals

message GetMealsRequest {

}

message GetMealsResponse {
  repeated Meal meals = 1;
}

message CreateMealRequest {
  Meal meal = 1;
}

message CreateMealResponse {
  int64 meal_id = 1;
}

message UpdateMealRequest {
  Meal meal = 1;
}

message UpdateMealResponse {
  
}

message UpdateMealImageRequest {
  int64 id = 1;
  bytes image_bytes = 2;
}

message UpdateMealImageResponse {

}

message DeleteMealRequest {
  int64 meal_id = 1;
}

message DeleteMealResponse {

}

// ingredients

message GetIngredientsRequest {

}

message GetIngredientsResponse {
  repeated Ingredient ingredients = 1;
}

message CreateIngredientRequest {
  Ingredient ingredient = 1;
}

message CreateIngredientResponse {
  int64 ingredient_id = 1;
}

message UpdateIngredientRequest {
  Ingredient ingredient = 1;
}

message UpdateIngredientResponse {
  
}

message DeleteIngredientRequest {
  int64 ingredient_id = 1;
}

message DeleteIngredientResponse {

}

// ingredient categories

message GetIngredientCategoriesRequest {}

message GetIngredientCategoriesResponse {
  repeated IngredientCategory ingredient_categories = 1;
}

message CreateIngredientCategoryRequest {
  IngredientCategory ingredient_category = 1;
}

message CreateIngredientCategoryResponse {
  int64 ingredient_category_id = 1;
  int64 sort_index = 2;
}

message UpdateIngredientCategoryRequest {
  IngredientCategory ingredient_category = 1;
}

message UpdateIngredientCategoryResponse {}

message DeleteIngredientCategoryRequest {
  int64 ingredient_category_id = 1;
}

message DeleteIngredientCategoryResponse {}

message SwapIngredientCategoriesRequest {
  int64 ingredient_category_a = 1;
  int64 ingredient_category_b = 2;
}

message SwapIngredientCategoriesResponse {}

// service

service ShoppingListService {
  // plan
  rpc GetPlan(GetPlanRequest) returns (GetPlanResponse);
  rpc UpdatePlan(UpdatePlanRequest) returns (UpdatePlanResponse);

  // meals
  rpc GetMeals(GetMealsRequest) returns (GetMealsResponse);
  rpc CreateMeal(CreateMealRequest) returns (CreateMealResponse);
  rpc UpdateMeal(UpdateMealRequest) returns (UpdateMealResponse);
  rpc UpdateMealPreviewImageRequest(UpdateMealImageRequest) returns (UpdateMealImageResponse);
  rpc UpdateMealIngredientsImageRequest(UpdateMealImageRequest) returns (UpdateMealImageResponse);
  rpc DeleteMeal(DeleteMealRequest) returns (DeleteMealResponse);

  // ingredients

  rpc GetIngredients(GetIngredientsRequest) returns (GetIngredientsResponse);
  rpc CreateIngredient(CreateIngredientRequest) returns (CreateIngredientResponse);
  rpc UpdateIngredient(UpdateIngredientRequest) returns (UpdateIngredientResponse);
  rpc DeleteIngredient(DeleteIngredientRequest) returns (DeleteIngredientResponse);

  // ingredient categories
  rpc GetIngredientCategories(GetIngredientCategoriesRequest) returns (GetIngredientCategoriesResponse);
  rpc CreateIngredientCategory(CreateIngredientCategoryRequest) returns (CreateIngredientCategoryResponse);
  rpc UpdateIngredientCategory(UpdateIngredientCategoryRequest) returns (UpdateIngredientCategoryResponse);
  rpc DeleteIngredientCategory(DeleteIngredientCategoryRequest) returns (DeleteIngredientCategoryResponse);
  rpc SwapIngredientCategories(SwapIngredientCategoriesRequest) returns (SwapIngredientCategoriesResponse);
}